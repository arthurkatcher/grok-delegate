name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: plugins/delegate tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/delegate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: plugins/delegate/package.json

      - name: Install (if lockfile present)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            # No production deps today; still resolve dev/scripts cleanly
            npm install --no-fund --no-audit
          fi

      - name: Test
        run: npm test

  # Grok's built-in plugin package check (manifest + component layout).
  # Not a full runtime smoke — that still needs a real Grok session + CLIs.
  validate-plugin:
    name: grok plugin validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Grok CLI
        env:
          # Official installer: GROK_BIN_DIR (default ~/.grok/bin)
          GROK_BIN_DIR: ${{ runner.temp }}/grok-bin
        run: |
          mkdir -p "$GROK_BIN_DIR"
          curl -fsSL https://x.ai/cli/install.sh | bash
          echo "$GROK_BIN_DIR" >> "$GITHUB_PATH"
          "$GROK_BIN_DIR/grok" --version

      - name: Validate plugin manifest
        env:
          GROK_BIN_DIR: ${{ runner.temp }}/grok-bin
        run: |
          export PATH="$GROK_BIN_DIR:$PATH"
          grok plugin validate plugins/delegate
